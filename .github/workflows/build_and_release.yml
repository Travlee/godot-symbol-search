name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  PLUGIN_NAME: godot_script_switcher

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: .dll
          - os: ubuntu-latest
            ext: .so
          - os: macos-latest
            ext: .dylib
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Compiler Cache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: ${{ matrix.os == 'windows-latest' && 'sccache' || 'ccache' }}
          key: ${{ runner.os }}-godot-cpp-${{ github.ref }}

      - name: Configure CMake
        run: >
          cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=${{ matrix.os == 'windows-latest' && 'sccache' || 'ccache' }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ matrix.os == 'windows-latest' && 'sccache' || 'ccache' }}

      - name: Build plugin
        run: cmake --build build --config Release

      - name: Upload compiled library
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.os }}
          path: godot/addons/${{ env.PLUGIN_NAME }}/*${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout base plugin files
        uses: actions/checkout@v4

      - name: Download compiled libraries
        uses: actions/download-artifact@v4
        with:
          path: godot/addons/${{ env.PLUGIN_NAME }}
          merge-multiple: true

      - name: Copy docs to plugin dir
        run: >
          cp LICENSE README.md godot/addons/${{ env.PLUGIN_NAME }}/

      - name: Zip plugin directory
        run: |
          7z a -tzip "${PLUGIN_NAME}-${GITHUB_REF_NAME}.zip" "godot/addons/${PLUGIN_NAME}/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
          generate_release_notes: true
